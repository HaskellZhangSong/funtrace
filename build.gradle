plugins {
    id 'org.jetbrains.kotlin.multiplatform' version '2.1.0'
    id 'maven-publish'
}

group = 'func.trace'
version = '1.0.0'

repositories {
    mavenCentral()
}

kotlin {
    jvmToolchain(17)

    jvm()
    macosArm64()
    macosX64()

    sourceSets {
        commonMain {
            dependencies {}
        }
        commonTest {
            dependencies {
                implementation kotlin('test')
            }
        }
    }
}

publishing {
    repositories {
        mavenLocal()
    }
}
